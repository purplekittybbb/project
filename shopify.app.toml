# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6a58ca16a8a1e054e9a857b01480638d"
name = 'Sol menüde **"Dev dashboard"**'
application_url = "https://matsorular.vercel.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Must match the `scope` this app actually requests in its OAuth authorize
# URL (see buildAuthorizeUrl's default in lib/shopify-api/client.ts) — with
# embedded = true, Shopify's install consent screen is driven by THIS field,
# not the dynamic `scope=` query param the OAuth code sends. Left empty
# before, the real install screen showed only the Shopify-default "View
# staff and contributor data" permission — never read_orders — so a
# completed install would have granted a token unable to read any order
# data, confirmed live against a real test store before this fix.
scopes = "read_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://matsorular.vercel.app/api/shopify/oauth/callback" ]

[webhooks]
api_version = "2026-07"

  # orders/create + orders/updated removed again 2026-07-19: a live
  # `shopify app deploy` still returned "This app is not approved to
  # subscribe to webhook topics containing protected customer data" after
  # the Partner Dashboard request, so approval has NOT actually taken
  # effect on Shopify's side yet (form submitted ≠ granted — check the
  # Protected Customer Data card in Partner Dashboard for an explicit
  # "Approved" status, not just "Requested"/"Pending"). Order sync keeps
  # working via the hourly cron (/api/cron/sync-marketplaces) in the
  # meantime. Once the dashboard genuinely shows Approved, re-add:
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/create", "orders/updated" ]
  #   uri = "/api/shopify/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/shopify/webhooks"

  # Mandatory GDPR compliance topics — Shopify requires these to be
  # subscribed (and respond 200) before granting Protected Customer Data
  # access, which is what unblocks the orders/create + orders/updated
  # webhooks above. Handlers live in the same route (topic-routed).
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/api/shopify/webhooks"
