# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6a58ca16a8a1e054e9a857b01480638d"
name = 'Sol menüde **"Dev dashboard"**'
application_url = "https://matsorular.vercel.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Must match the `scope` this app actually requests in its OAuth authorize
# URL (see buildAuthorizeUrl's default in lib/shopify-api/client.ts) — with
# embedded = true, Shopify's install consent screen is driven by THIS field,
# not the dynamic `scope=` query param the OAuth code sends. Left empty
# before, the real install screen showed only the Shopify-default "View
# staff and contributor data" permission — never read_orders — so a
# completed install would have granted a token unable to read any order
# data, confirmed live against a real test store before this fix.
scopes = "read_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://matsorular.vercel.app/api/shopify/oauth/callback" ]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "orders/create", "orders/updated" ]
  uri = "/api/shopify/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/shopify/webhooks"
